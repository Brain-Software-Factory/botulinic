name: Deploy a botulinic.com.ar (Prod VPS)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-botulinic-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BOTULINIC_PROD_DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "37.60.227.83 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIP8Mab9OnlmDLvKEYvPO4cK1VDbH/qSIMFPzq/WYCGhf" >> ~/.ssh/known_hosts

      # La deploy key está restringida en la VPS con rrsync -wo /root/landing-page,
      # así que el rsync escribe SOLO en esa carpeta (bind mount del stack Swarm
      # `landing-page` = nginx:alpine, ruteado por Traefik a botulinic.com.ar con
      # cert Let's Encrypt). nginx sirve la carpeta al instante, sin restart.
      - name: Deploy (rsync a /root/landing-page)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='Readme.txt' \
            --exclude='*.map' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes" \
            ./ root@37.60.227.83:/

      - name: Verificar sitio
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://botulinic.com.ar)
            echo "Intento $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 6
          done
          echo "El sitio no respondió 200 tras los reintentos"
          exit 1
